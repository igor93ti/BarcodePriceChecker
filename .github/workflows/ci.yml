name: CI — Build & Test

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Executar testes
        run: dotnet test --no-build -c Release --verbosity normal --results-directory ./coverage

      - name: Upload cobertura de código
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: ./coverage
          retention-days: 7

  docker-build:
    name: Docker Build (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pricechecker:ci .

      - name: Verificar imagem
        run: docker images pricechecker:ci
