name: CD — Deploy para Azure

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

env:
  DOTNET_VERSION: "8.0.x"
  AZURE_WEBAPP_NAME: "pricechecker-app"       # ← Altere para o nome do seu Azure App Service
  AZURE_WEBAPP_PACKAGE_PATH: "./publish"

jobs:
  # ──────────────────────────────────────────────
  # 1. CI roda antes do deploy
  # ──────────────────────────────────────────────
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.name }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restaurar e Build
        run: |
          dotnet restore
          dotnet build --no-restore -c Release

      - name: Executar testes
        run: dotnet test --no-build -c Release --verbosity minimal

      - name: Publicar aplicação
        run: dotnet publish src/BarcodePriceChecker.Web/BarcodePriceChecker.Web.csproj \
          -c Release \
          -o ${{ env.AZURE_WEBAPP_PACKAGE_PATH }} \
          --no-build

      - name: Upload artefato de deploy
        id: set-artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-${{ github.sha }}
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          retention-days: 3

  # ──────────────────────────────────────────────
  # 2. Deploy para Azure App Service
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy → Azure (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download artefato
        uses: actions/download-artifact@v4
        with:
          name: webapp-${{ github.sha }}
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # Para configurar: az ad sp create-for-rbac --name "pricechecker" --role contributor
          # --scopes /subscriptions/{id}/resourceGroups/{rg} --sdk-auth

      - name: Deploy no Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Health check pós-deploy
        run: |
          sleep 30
          curl --fail https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health \
            || (echo "Health check falhou!" && exit 1)

      - name: Notificação de sucesso
        if: success()
        run: echo "✅ Deploy realizado com sucesso em $(date)"

      - name: Notificação de falha
        if: failure()
        run: echo "❌ Deploy falhou em $(date)"
